name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Extract version from tag
        id: tag_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: sbt clean test

      - name: Publish to Maven Central
        run: sbt publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Release to Maven Central
        run: sbt sonatypeBundleRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/scala-3.6.1/schneileopard-core*.jar
            target/scala-3.6.1/schneileopard-omics*.jar
            target/scala-3.6.1/schneileopard-graph*.jar
            target/scala-3.6.1/schneileopard-ai*.jar
            target/scala-3.6.1/schneileopard-io*.jar
          body: |
            Release of Schnéileopard ${{ steps.tag_version.outputs.VERSION }}

            This release has been published to Maven Central and is available via:

            ```scala
            libraryDependencies ++= Seq(
              "io.github.olaflaitinen" %% "schneileopard-core" % "${{ steps.tag_version.outputs.VERSION }}",
              "io.github.olaflaitinen" %% "schneileopard-omics" % "${{ steps.tag_version.outputs.VERSION }}",
              "io.github.olaflaitinen" %% "schneileopard-graph" % "${{ steps.tag_version.outputs.VERSION }}",
              "io.github.olaflaitinen" %% "schneileopard-ai" % "${{ steps.tag_version.outputs.VERSION }}",
              "io.github.olaflaitinen" %% "schneileopard-io" % "${{ steps.tag_version.outputs.VERSION }}"
            )
            ```

            For details, see [CHANGELOG.md](CHANGELOG.md) and [COMPATIBILITY.md](COMPATIBILITY.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
