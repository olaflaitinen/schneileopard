name: Continuous Integration

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scala: [ '3.6.1' ]
        java: [ '11', '17', '21' ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: sbt
      - name: Install sbt
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https curl gnupg2 lsb-release ca-certificates
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84ECB3F05FC7B2176C619AEBC" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - name: Compile
        run: sbt clean compile
      - name: Run tests
        run: sbt test
      - name: Check formatting
        run: sbt scalafmtCheckAll
      - name: Check Scaladoc
        run: sbt doc

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: sbt
      - name: Install sbt
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https curl gnupg2 lsb-release ca-certificates
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84ECB3F05FC7B2176C619AEBC" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - name: Run tests with coverage
        run: sbt test
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./target/coverage-report/cobertura.xml
          fail_ci_if_error: false

  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: sbt
      - name: Install sbt
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https curl gnupg2 lsb-release ca-certificates
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84ECB3F05FC7B2176C619AEBC" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Publish to Maven Central
        run: sbt publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Release to Maven Central
        run: sbt sonatypeBundleRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
